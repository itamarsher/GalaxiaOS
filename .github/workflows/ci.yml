name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: abos
          POSTGRES_PASSWORD: abos
          POSTGRES_DB: abos_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U abos"
          --health-interval 5s --health-timeout 5s --health-retries 12
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 12
    env:
      ABOS_DATABASE_URL: postgresql+asyncpg://abos:abos@localhost:5432/abos_test
      ABOS_TEST_DATABASE_URL: postgresql+asyncpg://abos:abos@localhost:5432/abos_test
      ABOS_REDIS_URL: redis://localhost:6379/0
      # Test-only master key (32 bytes, base64url). Not a real secret.
      ABOS_MASTER_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaQ=
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend (with dev extras)
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check app tests
      - name: Provider boundary guard
        working-directory: .
        run: make check-providers
      - name: Apply migrations (validates the full chain against pgvector)
        run: alembic upgrade head
      - name: Tests
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm build

  deploy:
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploys (no-op until hooks are configured)
        env:
          API_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_API }}
          WORKER_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_WORKER }}
          WEB_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_WEB }}
        run: |
          if [ -z "$API_HOOK" ]; then
            echo "Render deploy hooks not configured; skipping deploy."
            exit 0
          fi
          curl -fsS -X POST "$API_HOOK"
          curl -fsS -X POST "$WORKER_HOOK"
          curl -fsS -X POST "$WEB_HOOK"
