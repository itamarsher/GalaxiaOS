name: Issue implement agent

# Fires only when the triage agent (or a maintainer) applies the
# `claude-implement` label. Claude reads the issue + the triage agent's
# "Implementation notes" comment, implements the fix on a branch, and opens a PR
# that closes the issue. The PR is gated by CI + human review — nothing lands on
# the default branch automatically.
on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  implement:
    if: github.event.label.name == 'claude-implement'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Resolve issue #${{ github.event.issue.number }} in this repository.

            First read the issue and the "## Implementation notes" comment left
            by the triage agent — follow that note as your plan. Then implement
            the fix on a new branch and open a pull request whose description
            includes "Closes #${{ github.event.issue.number }}".

            Backend lives in `backend/` (Python, uv, pytest); run the relevant
            tests with `uv run pytest` before opening the PR and mention the
            result in the PR body. Keep the change scoped to the issue — do not
            refactor beyond it. If the notes turn out to be wrong or the change
            is larger/riskier than they imply, stop and explain in a comment
            rather than forcing a fix.
