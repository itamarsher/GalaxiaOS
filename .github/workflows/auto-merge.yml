name: Auto review & merge

# Closes the "PR approval is a human gate" gap WITHOUT relying on branch
# protection (which is paid on private repos). Instead of arming GitHub's
# auto-merge and trusting protection to withhold it until CI passes, this workflow
# is itself gated on CI: it runs only after the "CI" workflow completes
# SUCCESSFULLY for a pull request, re-verifies the checks, reviews the diff,
# escalates founder-level changes, and then merges directly. The CI-green gate is
# enforced here in the workflow, so no repo-level branch protection is required.
#
# When you later make the repo public (branch protection becomes free), you can
# additionally add a ruleset requiring the CI checks + a review for defence in
# depth — this workflow keeps working either way. See docs/DOGFOODING_OPERATIONS.md.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  auto_merge:
    # Only when CI passed, and only for CI runs triggered by a pull request (not
    # pushes to the default branch).
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write        # merge the PR
      pull-requests: write   # approve, label, comment
      issues: write          # label + comment the linked issue
      actions: read          # read CI / check status
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          # The reviewer talks to GitHub and reads code; it never edits files.
          claude_args: "--allowed-tools Bash(gh:*),Read,Grep,Glob"
          prompt: |
            You are the autonomous PR reviewer + merge gate for this repository.
            CI just completed SUCCESSFULLY for commit
            ${{ github.event.workflow_run.head_sha }} on branch
            "${{ github.event.workflow_run.head_branch }}". The gh CLI is already
            authenticated. There is NO branch protection, so YOU are the gate:
            merge only when every condition below holds. Follow this exactly.

            0. KILL SWITCH. Read `.github/dogfooding.yml`. If `auto_merge.enabled`
               is false, OR the repository variable `DOGFOODING_AUTOMERGE` equals
               "off" (`gh variable get DOGFOODING_AUTOMERGE`; a missing variable =
               "on"), stop now, approve nothing, merge nothing, comment nothing.

            1. FIND THE PR. Locate the open PR for this branch:
               `gh pr list --head "${{ github.event.workflow_run.head_branch }}" --state open --json number,labels,headRefOid,isDraft`.
               If there is none, stop silently. If it is a draft, stop silently.

            2. ELIGIBILITY. The PR must carry one of `auto_merge.eligible_labels`
               from the config (e.g. `claude-implement`). If not, stop silently —
               human PRs are not this workflow's concern.

            3. FRESHNESS. The PR's `headRefOid` MUST equal
               ${{ github.event.workflow_run.head_sha }}. If it differs, a newer
               commit was pushed after this CI run — stop silently; that commit's
               own CI run will re-trigger this workflow.

            4. RE-VERIFY CI. Run `gh pr checks <n>`. EVERY required check must be
               passing/success. If anything is pending or failing, stop (do not
               merge). This is belt-and-suspenders on top of the workflow_run gate.

            5. ESCALATION BOUNDARY. Get changed files:
               `gh pr diff <n> --name-only`. If ANY file matches ANY glob in
               `escalate_paths`, this is founder-level and NOT yours to merge:
                 - add the label `founder-review` (create with `gh label create` if
                   missing),
                 - post ONE comment naming the file(s) that triggered escalation and
                   that a founder must review/merge,
                 - do NOT approve, do NOT merge. Stop.

            6. RUNAWAY CAP. Count PRs merged in the last 24h
               (`gh pr list --state merged --search "merged:>=<24h-ago>"`). If that
               is >= `auto_merge.max_merges_per_day`, post ONE comment that the
               daily cap was hit and a founder should merge manually. Stop.

            7. REVIEW. Read the diff (`gh pr diff <n>`). Review ONLY for: does it do
               what the linked issue asked, is it scoped (no unrelated refactors),
               obvious correctness bugs, and tests when behavior changed. A
               capability PR should register its new tool AND add a test exercising
               it (see docs/DOGFOODING_OPERATIONS.md) — flag it if not. If you find
               real problems, post a concise review requesting the specific changes
               and stop (do not merge).

            8. APPROVE + MERGE. If the review is clean:
                 - `gh pr review <n> --approve` with a one-line rationale,
                 - merge directly with the configured method + delete the branch.
                   Because this repo squash-merges, the squash commit is the ONLY
                   thing that reaches main and YOU write its message — so it must
                   be clean. Pass an explicit message: subject = the PR title with
                   "(#<n>)", body = a concise summary you write. Do NOT let any
                   Claude Code per-session trailer or session URL from the branch
                   commits end up in it (the no-session-links check enforces this
                   on main). Example:
                     `gh pr merge <n> --squash --delete-branch \`
                     `  --subject "<pr title> (#<n>)" --body "<clean summary>"`.
               (Merge directly, NOT `--auto`: GitHub's auto-merge needs required
               checks / protection to be meaningful, which this repo doesn't have —
               and you have already verified CI is green in steps 3–4.)
               Post the merged PR URL as your final message.

            Be terse. Comment only when you escalate, request changes, or hit the
            cap — an approval + merge speaks for itself.
