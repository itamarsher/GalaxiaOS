# OpenClaw Gateway configuration for the managed internal runtime (RFC 0001 §5/§6).
#
# This is the batteries-included persona host: one Gateway, one persistent persona
# per (company, function). Values are read from the environment so no secret is
# baked into the image. Section/field names below follow OpenClaw's documented
# config shape — confirm them against the pinned OPENCLAW_IMAGE's docs, since the
# schema can drift across versions; the SECURITY-relevant settings (bind + auth)
# are the ones to get right.
#
# NOTE: `${VAR}` here assumes OpenClaw's config loader interpolates environment
# variables. If your pinned version does not, pass these values on the command line
# in entrypoint.sh instead (e.g. --auth-token "$OPENCLAW_GATEWAY_TOKEN") — the
# secret still comes from the environment, never baked into the image either way.

[server]
# Bind all interfaces: safe only because this runs as a Render PRIVATE service
# with no public route (render.yaml `type: pserv`). Never expose a public domain.
host = "0.0.0.0"
port = "${OPENCLAW_PORT}"

[server.auth]
# Require a static bearer on every request. Galaxia sends this as
# `Authorization: Bearer <ABOS_OPENCLAW_API_KEY>`; the two must be the same secret.
# This is defense-in-depth *on top of* the private-network isolation — an
# unauthenticated request from anywhere, even inside the VPC, is rejected.
type = "bearer"
token = "${OPENCLAW_GATEWAY_TOKEN}"

# ── Model providers (BYOK) ─────────────────────────────────────────────────────
# The personas need a real LLM to run. Provide at least one; keys come from the
# environment (set as sync:false secrets on the Render service). Add/remove blocks
# to match which provider keys you actually configure.
[providers.anthropic]
api_key = "${ANTHROPIC_API_KEY}"

[providers.openai]
api_key = "${OPENAI_API_KEY}"

[providers.openrouter]
api_key = "${OPENROUTER_API_KEY}"

# ── Persona routing ────────────────────────────────────────────────────────────
# Galaxia routes each function to its own persona with
# `model = "openclaw/<company_id>:<function>"` (RFC §6 — the same role across two
# companies is two isolated personas, never shared). This wildcard tells the
# Gateway to materialize a persona per distinct agent id on first use, each with
# its own workspace / memory / session store (OpenClaw's docs warn never to reuse
# an agentDir across tenants). `default_model` is the underlying LLM each persona
# reasons with; override per-persona upstream if needed.
[agents."openclaw/*"]
isolated = true
default_model = "${OPENCLAW_DEFAULT_MODEL:-anthropic/claude-sonnet-5}"
