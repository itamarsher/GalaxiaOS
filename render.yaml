# Render Blueprint for ABOS — managed Postgres + Redis, API + worker + web.
#
# Apply via Render Dashboard → "New +" → "Blueprint" (point at this repo). Secret
# env vars (sync:false) must be set in the dashboard after first apply. Verify
# plan names / region against your Render account — plans evolve.
#
# Deploys are gated on green CI: `autoDeploy: false` here, and the GitHub Actions
# `deploy` job triggers a Render Deploy Hook per service only after tests pass.

databases:
  - name: abos-postgres
    plan: basic-256mb
    postgresMajorVersion: "16"
    # pgvector: the baseline Alembic migration runs `CREATE EXTENSION vector`,
    # which Render Postgres supports. No manual step needed.

services:
  # Managed Redis-compatible store (rate limiting + arq queue).
  - type: keyvalue
    name: abos-redis
    plan: starter
    ipAllowList: []  # internal-only

  # FastAPI app. Migrations run as a pre-deploy step before each release.
  - type: web
    name: abos-api
    # Production branch. Pinned explicitly so a Blueprint sync deploys from here
    # regardless of which branch the Blueprint itself is connected to (otherwise
    # services default to the Blueprint's branch). Keep these in sync if the
    # production branch ever changes.
    branch: main
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    autoDeploy: false
    healthCheckPath: /health/ready
    preDeployCommand: "alembic upgrade head"
    envVars:
      - key: ABOS_DATABASE_URL
        fromDatabase:
          name: abos-postgres
          property: connectionString
      - key: ABOS_REDIS_URL
        fromService:
          name: abos-redis
          type: keyvalue
          property: connectionString
      - key: ABOS_RATE_LIMIT_BACKEND
        value: redis
      - key: ABOS_MASTER_KEY
        sync: false   # set in dashboard: `make gen-key`
      - key: ABOS_JWT_SECRET
        generateValue: true
      # Browser origins allowed to call the API. Set to the abos-web origin
      # (comma-separated for multiple), e.g. https://abos-web.onrender.com.
      - key: ABOS_CORS_ALLOW_ORIGINS
        sync: false
      # This API's own public URL — the OAuth redirect base and the absolute POST
      # target for landing-page lead-capture forms (static pages on Cloudflare
      # Pages can't use a relative URL). Auto-wired from THIS service's own host so
      # the API domain lives in exactly one place: change the service's domain and
      # every consumer follows. Render supplies the host with no scheme
      # (abos-api.onrender.com); the backend normalizes it to https:// at load
      # (config.normalize_base_url), so the constructed OAuth redirect URI still
      # matches the one registered on the Google client.
      - key: ABOS_PUBLIC_API_BASE_URL
        fromService:
          type: web
          name: abos-api
          property: host
      # Where the OAuth callback sends the founder's browser afterwards (the web
      # app's Settings page). Auto-wired from the web service's host, so the web
      # domain likewise lives in one place.
      - key: ABOS_WEB_BASE_URL
        fromService:
          type: web
          name: abos-web
          property: host
      # Connected (OpenClaw) runtime — private-network address + the shared bearer,
      # so the push worker can reach the Gateway. Off unless abos-openclaw is
      # deployed (empty base URL ⇒ an `external` agent reports "no runtime
      # connected"). Set ABOS_DEFAULT_AGENT_BACKEND=external to make it the default
      # binding for newly generated functions (RFC 0001 §5).
      - key: ABOS_OPENCLAW_BASE_URL
        value: http://abos-openclaw:18789
      - key: ABOS_OPENCLAW_API_KEY
        fromService:
          type: pserv
          name: abos-openclaw
          envVarKey: OPENCLAW_GATEWAY_TOKEN
      - fromGroup: abos-shared

  # arq worker (agent runtime + scheduled jobs). Same image, different command.
  - type: worker
    name: abos-worker
    branch: main
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: "arq app.runtime.worker.WorkerSettings"
    autoDeploy: false
    envVars:
      - key: ABOS_DATABASE_URL
        fromDatabase:
          name: abos-postgres
          property: connectionString
      - key: ABOS_REDIS_URL
        fromService:
          name: abos-redis
          type: keyvalue
          property: connectionString
      - key: ABOS_MASTER_KEY
        sync: false
      - key: ABOS_JWT_SECRET
        fromService:
          name: abos-api
          type: web
          envVarKey: ABOS_JWT_SECRET
      # Agents (running here) generate landing pages whose lead-capture form POSTs
      # back to the API — same single-source API host the web service uses.
      - key: ABOS_PUBLIC_API_BASE_URL
        fromService:
          type: web
          name: abos-api
          property: host
      # The push worker (ConnectedBackend → OpenClawWorker) runs HERE, so the
      # Gateway binding must be present on the worker too (same private-network
      # address + shared bearer as the API).
      - key: ABOS_OPENCLAW_BASE_URL
        value: http://abos-openclaw:18789
      - key: ABOS_OPENCLAW_API_KEY
        fromService:
          type: pserv
          name: abos-openclaw
          envVarKey: OPENCLAW_GATEWAY_TOKEN
      - fromGroup: abos-shared

  # Managed OpenClaw Gateway — the internal-agent runtime for `external`-bound
  # functions (RFC 0001 §5). PRIVATE service: a `pserv` has NO public URL and is
  # reachable only from other services in this project over the private network, at
  # http://abos-openclaw:18789. It is never exposed to the internet — do not attach a
  # custom/public domain. Bearer auth (below) is a second, independent layer on top
  # of that isolation, so even an unauthenticated request that reached the private
  # network is rejected. See gateway/README.md.
  - type: pserv
    name: abos-openclaw
    branch: main
    runtime: docker
    dockerfilePath: ./gateway/Dockerfile
    dockerContext: ./gateway
    autoDeploy: false
    envVars:
      # The bearer Galaxia must present. Generated here and shared to the callers
      # as ABOS_OPENCLAW_API_KEY, so the shared secret lives in exactly one place
      # and no human copies it. The config interpolates it; a missing token fails
      # config load, so the gateway never boots unauthenticated.
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
      # BYOK model provider(s) the personas reason with — set at least one in the
      # dashboard. The gateway binds 0.0.0.0:18789 (from gateway/config/openclaw.json).
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

  # Next.js frontend.
  - type: web
    name: abos-web
    branch: main
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile.prod
    dockerContext: ./frontend
    autoDeploy: false
    envVars:
      # Baked into the client bundle at build time. Auto-wired from the API
      # service so a fresh blueprint needs no manual dashboard step: Render
      # supplies the API's host (no scheme), and the client normalizes it to an
      # absolute https:// URL (see frontend/lib/api.ts). NB: this is a build-time
      # value — after it changes you must rebuild abos-web (Clear build cache &
      # deploy), not just restart it.
      - key: NEXT_PUBLIC_API_BASE_URL
        fromService:
          type: web
          name: abos-api
          property: host

envVarGroups:
  - name: abos-shared
    envVars:
      - key: ABOS_LOG_JSON
        value: "true"
      - key: ABOS_LOG_LEVEL
        value: INFO
      - key: ABOS_RATE_LIMIT_ENABLED
        value: "true"
      - key: ABOS_RATE_LIMIT_PER_MINUTE
        value: "120"
      # System-wide error monitoring: escalate code errors (any logged traceback)
      # and Render platform failures (failed deploys / suspended services) to
      # deduplicated auto-fix tracker issues. Needs a GitHub token + repo, and a
      # Render API key for the platform scan. All secrets are sync:false, so set
      # them per deployment; the feature no-ops until they're present.
      - key: ABOS_ERROR_MONITOR_ENABLED
        value: "true"
      - key: ABOS_GITHUB_TOKEN
        sync: false
      - key: ABOS_GITHUB_REPO
        sync: false
      - key: ABOS_RENDER_API_KEY
        sync: false
      # ABOS_RENDER_OWNER_ID is intentionally omitted — it is auto-derived from the
      # Render API key. Set it only to disambiguate a key that sees multiple owners.
      # NB: landing-page hosting + domain connection (Cloudflare Pages + DNS) are
      # bring-your-own-key — each company sets its own Cloudflare API token + account
      # id in Settings. There are intentionally no global Cloudflare env vars here.
